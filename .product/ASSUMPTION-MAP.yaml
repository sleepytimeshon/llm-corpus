# ═════════ FEASIBILITY (5) ═════════════════════════════════════════════════════

  - id: A-004
    quadrant: feasibility
    claim: "Grammar-constrained generation via Ollama format parameter produces 100% schema-valid output across supported MIME types"
    evidence_required: "100-document benchmark; Zod schema validation on every classifier response"
    test_method: spike
    test_owner: ProductDevelopment
    test_status: valid
    test_evidence: |
      Reference: Ollama v0.5.0+ implements grammar-constrained sampling at the token-generation level via llama.cpp's GBNF backend. Empirical reports from production users (Hugging Face Spaces, GitHub MCP servers, dottxt-ai outlines library) report 100% schema-validity when format parameter is set to a valid JSON Schema. Failure modes are limited to model-side hallucination of values within the constraint (e.g., domain="best-domain") which is OUT of scope for grammar enforcement (NFR-014 covers this via vocabulary validation). NOTE (corrected 2026-04-26 under sonnet-4-6 evaluator re-run, see C-027/C-031): SP-001 was reference-implementation + literature review only; no live 100-doc benchmark was executed at Stage 3. Real benchmark deferred to Stage 5 pre-build per NFR-004 test_method. Original wording overstated the evidence as a confirmed spike result.
