            quadrant: feasibility
            claim: "Ollama's `format` parameter (JSON Schema constraint) reliably constrains qwen3:8b output such that invalid metadata is structurally impossible at the token level"
            evidence_required: "100-document classification run with schema validation; expect 100% schema-valid output"
            test_method: spike
