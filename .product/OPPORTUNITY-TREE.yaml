  - id: OPP-007
    title: "When my organizational vocabulary needs to grow with a new interest area, fixed enumerations force me to either misfile the document or stop and re-engineer the taxonomy"
    evidence: "Domains and tags are validated against the live corpus rather than a fixed enumeration, which allows the organizational system to grow with the user's interests without operator intervention. (WHITEPAPER Abstract; §3.3)"
    personas_affected: [P-002]
    severity: medium
    frequency: sometimes
    solutions:
