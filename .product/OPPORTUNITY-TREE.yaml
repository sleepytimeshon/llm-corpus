            confidence: medium
            blocks_solution: true

  - id: OPP-003
    title: "I started tagging my documents diligently and gave up around document two hundred — the system I was supposed to maintain rotted because the per-document cost was on me"
    evidence: "Manual tagging decays. Users tag diligently for the first fifty documents and abandon the practice by document two hundred. (WHITEPAPER §1.2)"
    personas_affected: [P-001, P-002]
    severity: high
    frequency: constant
    solutions:
      - id: SOL-003-A
        title: "Local-LLM classifier with grammar-enforced JSON Schema output at ingest time"
        type: build
