            quadrant: viability
            claim: "Classifier runs at zero marginal cost per document on user hardware (RTX 4090 or M-series Mac) within acceptable wall-clock per ingest"
            evidence_required: "Benchmark classification latency for 100 docs of varying length on target hardware"
            test_method: spike
            test_owner: Shon
            test_status: untested
            confidence: high
            blocks_solution: false

