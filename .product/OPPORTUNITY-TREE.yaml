    title: "When I ask my agent something my own library would answer, it answers from training data or hallucinates instead of checking what I read"
    evidence: "When the user asks the agent a question that their own library would answer, the agent answers from its training cutoff or hallucinates. (WHITEPAPER §1.1)"
    personas_affected: [P-001, P-002]
    severity: high
    frequency: constant
    solutions:
