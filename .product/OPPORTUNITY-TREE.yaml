            test_method: spike
            test_owner: Shon
            test_status: untested
            confidence: high
            blocks_solution: true

  - id: OPP-002
    title: "Every new session with my agent starts from scratch — the specs, papers, and notes that shape my actual work are invisible to it"
    evidence: "Every session begins again at the model's training cutoff, with no recall of the documents that shape the user's actual work. (WHITEPAPER Abstract)"
    personas_affected: [P-001, P-003]
    severity: high
    frequency: constant
    solutions:
      - id: SOL-002-A
        title: "MCP resources auto-loaded at session start (manifest, taxonomy, recent ingests)"
        type: build
        rough_effort: S
        rough_value: L
        assumptions:
          - id: A-003
            quadrant: usability
            claim: "Agents will use auto-loaded MCP resources to bias their reasoning toward corpus-grounded answers without per-prompt nudging from the user"
            evidence_required: "A/B compare Claude Code session with vs without auto-loaded corpus resources on a 10-query script"
            test_method: spike
