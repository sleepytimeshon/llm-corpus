          - id: A-011
            quadrant: desirability
            claim: "User welcomes auto-proposed taxonomy growth (does not feel it as loss of control over their classification system)"
            evidence_required: "Use the system for 30 days; reflect on whether new auto-proposed domains felt like enrichment or noise"
            test_method: interview
            test_owner: Shon
            test_status: untested
            confidence: medium
            blocks_solution: false

  - id: OPP-008
    title: "When a document arrives — a dropped file, a URL I want to keep, an inbox message — I have to stop my real work to process, normalize, and file it before it's useful"
    evidence: "The user supplies documents — by file drop, by URL, by inbox watcher, by direct command. ... A file-system watcher monitors an inbox directory ... Validated files enter a queue and are processed through the full pipeline ... without human intervention. (WHITEPAPER Abstract; §3.7)"
    personas_affected: [P-001, P-003]
    severity: medium
    frequency: constant
    solutions:
      - id: SOL-008-A
        title: "Inbox watcher + autonomous pipeline (validation gate → queue → extract → classify → embed → index, all idempotent + resumable)"
        type: build
        rough_effort: L
        rough_value: L
        assumptions:
          - id: A-012
            quadrant: feasibility
            claim: "Pipeline stages can be made idempotent + atomic + resumable so a process killed mid-run leaves the corpus in a recoverable state and resumes from the last successfully completed stage"
            evidence_required: "Kill -9 the pipeline at each of 6 stages on a 50-doc run; verify resume completes correctly without duplicates or corruption"
            test_method: spike
            test_owner: Shon
            test_status: untested
            confidence: medium
            blocks_solution: true
          - id: A-013
            quadrant: desirability
            claim: "A failure lane (structured diagnostics; user can inspect, correct, replay) is sufficient for trust — user does NOT need a UI for this"
            evidence_required: "Use the system 30 days; observe whether failure lane inspection feels acceptable or whether a human-readable triage UI becomes necessary"
            test_method: interview
            test_owner: Shon
            test_status: untested
            confidence: medium
            blocks_solution: false

