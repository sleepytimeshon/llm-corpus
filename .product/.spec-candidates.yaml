# OUT-OF-SCOPE (anti-goal-derived)
# ═══════════════════════════════════════════════════════════════════

out_of_scope:
  - id: OOS-001
    item: "Human-facing UI for browsing the corpus"
    rationale: "AG-001 (no human-facing UI for browsing, editing, or chatting with documents)"
    revisit_at: "post-v1 + 90 days"
    source: ANTI-GOALS.md
  - id: OOS-002
    item: "Human-facing UI for editing document frontmatter"
    rationale: "AG-001 (frontmatter editing happens via user's text editor on underlying Markdown file)"
    revisit_at: "post-v1 + 90 days"
    source: ANTI-GOALS.md
  - id: OOS-003
    item: "Chat interface to converse with documents directly"
    rationale: "AG-001 (the agent IS the UI; chat surface duplicates NotebookLM/AnythingLLM)"
    revisit_at: "post-v1 + 90 days"
    source: ANTI-GOALS.md
  - id: OOS-004
    item: "Failure-lane triage UI"
    rationale: "AG-001 (failure lane is structured-data + agent-mediated per FR-018+NFR-006)"
    revisit_at: "post-v1 + 90 days"
    source: ANTI-GOALS.md
  - id: OOS-005
    item: "LLM-generated summaries written into the canonical document store"
    rationale: "AG-002 (no LLM-generated/rewritten content; user is authority on document content)"
    revisit_at: "v2"
    source: ANTI-GOALS.md
  - id: OOS-006
    item: "LLM-rewritten / cleaned-up versions of ingested documents replacing originals"
    rationale: "AG-002 (LLM is classifier and retrieval target, not compiler — Karpathy LLM Wiki contrast)"
    revisit_at: "v2"
    source: ANTI-GOALS.md
  - id: OOS-007
    item: "Synthesized literature reviews stored in canonical corpus"
    rationale: "AG-002 (if generative-content workflow emerges, separate synthesis/ namespace with origin: ai-generated frontmatter)"
    revisit_at: "v2"
    source: ANTI-GOALS.md
  - id: OOS-008
    item: "Conversation memory / agent-side personality state"
    rationale: "AG-003 (memory = personality problem; corpus = experience problem; different objects, different lifecycles)"
    revisit_at: "never"
    source: ANTI-GOALS.md
  - id: OOS-009
    item: "SaaS connectors (Gmail, Slack, Notion, Drive)"
    rationale: "AG-003 (SaaS connectors belong to Danswer/Onyx-class enterprise search)"
    revisit_at: "never"
    source: ANTI-GOALS.md
  - id: OOS-010
    item: "Multi-user / team-shared corpus"
    rationale: "AG-003 (single-machine, single-user model; multi-user belongs to enterprise search)"
    revisit_at: "never"
    source: ANTI-GOALS.md
  - id: OOS-011
    item: "Cross-agent USER-validated capability claim in v1 (Gemini CLI/Codex CLI/Ollama)"
    rationale: "AG-004 (cross-agent is portability property of MCP protocol, not user-validated capability of v1; FR-022, FR-023, NFR-007, NFR-008 ship as should-priority portability surfaces only)"
    revisit_at: "post-v1"
    source: ANTI-GOALS.md
  - id: OOS-012
    item: "50-query labeled retrieval evaluation harness"
    rationale: "AG-005 (formal retrieval eval deferred to v1.5+; v1 ships with M-001 queries-per-week + acceptance as north-star surrogate)"
    revisit_at: "v1.5"
    source: ANTI-GOALS.md

