# Stage 2 Spec — candidate requirements (post-orchestrator-Splitting-Test, pre-promotion)
# Source: Architect agent output 2026-04-27T01:42 + Research-derived NFR baselines
# Splitting Test applied: FR-016 split into FR-016a (idempotent) + FR-016b (resumable)
# Research baselines integrated: NFR-003, NFR-014, NFR-015, NFR-016 added/refined

candidates:

  # ═══════════════════════════════════════════════════════════════════
  # MUST-HAVE — SOLUTION (MCP server core surface)
  # ═══════════════════════════════════════════════════════════════════

  - id: FR-001
    title: "MCP server exposes corpus.find tool over stdio transport"
    description: |
      The system runs as a single MCP server process that registers a corpus.find tool
      with the MCP runtime. The tool is discoverable via the standard MCP tool-listing
      handshake and invokable by any MCP-aware client connected over stdio.
    priority: must
    category: solution
    dependencies: []
    source_opportunity: OPP-001
    source_concerns: []
    quality_flag: null

  - id: FR-002
    title: "corpus.find accepts a structured query and returns ranked SearchHit list"
    description: |
      The corpus.find tool takes a structured input (free-text query string + optional
      filter facets) and returns an ordered SearchHit list. Each hit has stable URI,
      relevance-ordered rank, confidence-weighted score, and content excerpt sufficient
      for grounding without an additional fetch.
    priority: must
    category: solution
    dependencies: [FR-001]
    source_opportunity: OPP-001
    source_concerns: []
    quality_flag: null

  - id: FR-003
    title: "corpus.find ranks results via hybrid retrieval (BM25 + dense + graph + confidence)"
    description: |
      Ranking fuses keyword match (FTS5 BM25), dense vector similarity (sqlite-vec),
      knowledge-graph edges, and classifier-assigned confidence. Specific fusion algorithm
      (RRF, weighted sum, etc.) deferred to ADR; the four signals MUST all be inputs.
    priority: must
    category: solution
    dependencies: [FR-002]
    source_opportunity: OPP-001
    source_concerns: []
    quality_flag: null

  - id: FR-004
    title: "corpus.find returns deterministic structured error envelope on failure"
    description: |
      Non-success outcomes return a structured error envelope (stable error-code enum,
      human-readable message, hint field) as a normal MCP tool response — not a transport
      exception — so calling agents reason about failures in-band.
    priority: must
    category: solution
    dependencies: [FR-002]
    source_opportunity: OPP-001
    source_concerns: []
    quality_flag: null

  - id: FR-005
    title: "MCP server exposes corpus manifest as auto-loaded resource"
    description: |
      The server registers a manifest resource at corpus://manifest summarizing corpus
      state (doc count, established domains, established tags, last ingest timestamp).
      Annotated for auto-load at session start so agents bias toward the corpus without
      per-prompt nudging.
    priority: must
    category: solution
    dependencies: [FR-001]
    source_opportunity: OPP-002
    source_concerns: []
    quality_flag: null

  - id: FR-006
    title: "MCP server exposes taxonomy resource listing established domains and tags"
    description: |
      Resource at corpus://taxonomy enumerates established (promoted) domains and tags
      with per-term document counts. Canonical vocabulary for filtering corpus.find calls.
    priority: must
    category: solution
    dependencies: [FR-005]
    source_opportunity: OPP-002
    source_concerns: []
    quality_flag: null

  - id: FR-007
    title: "MCP server exposes recent-ingests resource"
    description: |
      Resource at corpus://recent lists most recently successfully ingested documents
      (title, domain, tags, ingest timestamp). Default window N (negotiable at Plan).
    priority: must
    category: solution
    dependencies: [FR-005]
    source_opportunity: OPP-002
    source_concerns: []
    quality_flag: null

  - id: FR-008
    title: "MCP server exposes per-document resource at stable URI"
    description: |
      Each ingested document addressable via stable URI corpus://docs/{id} returning
      normalized Markdown body + YAML frontmatter. URIs returned by corpus.find
      dereference here without ambiguity.
    priority: must
    category: solution
    dependencies: [FR-002]
    source_opportunity: OPP-004
    source_concerns: []
    quality_flag: null

  - id: FR-009
    title: "MCP server registers reusable retrieval prompt templates"
    description: |
      Server registers ≥1 reusable MCP prompt template instructing calling agents on
      how/when to invoke corpus.find before answering knowledge-grounded questions.
      Required for A-001 (cloud-LLM tool-use rate) to be testable in Validate.
    priority: must
    category: solution
    dependencies: [FR-001]
    source_opportunity: OPP-001
    source_concerns: []
    quality_flag: null

  # ═══════════════════════════════════════════════════════════════════
  # MUST-HAVE — SOLUTION (Ingest pipeline)
  # ═══════════════════════════════════════════════════════════════════

  - id: FR-010
    title: "Filesystem inbox watcher enqueues new documents for ingest"
    description: |
      Watcher monitors configured inbox directory. New files pass validation gate
      (extension allowlist, MIME sniff, max size, filename sanity) before enqueue.
      Watcher runs in same local process tree as server.
    priority: must
    category: solution
    dependencies: []
    source_opportunity: OPP-008
    source_concerns: []
    quality_flag: null

  - id: FR-011
    title: "Ingest pipeline normalizes documents to Markdown with YAML frontmatter"
    description: |
      Each accepted document extracted (PDF/HTML/text/etc.) and normalized to Markdown
      body + structured YAML frontmatter (id, source path, ingest timestamp, MIME type, hash).
    priority: must
    category: solution
    dependencies: [FR-010]
    source_opportunity: OPP-008
    source_concerns: []
    quality_flag: null

  - id: FR-012
    title: "Local-LLM classifier emits schema-valid metadata via grammar-constrained generation"
    description: |
      Classifier invokes local LLM (Ollama-served) with format param set to a Zod-derived
      JSON Schema. Output structurally constrained at token-generation level — invalid
      metadata impossible by construction. Schema covers domain, tags, summary, confidence.
    priority: must
    category: solution
    dependencies: [FR-011]
    source_opportunity: OPP-003
    source_concerns: []
    quality_flag: null

  - id: FR-013
    title: "Classifier output is schema-validated before frontmatter writeback"
    description: |
      Defense-in-depth validator runs on each classifier response before frontmatter write.
      Validation failure routes document to failure lane with structured diagnostic — does
      NOT silently drop or coerce.
    priority: must
    category: solution
    dependencies: [FR-012]
    source_opportunity: OPP-003
    source_concerns: []
    quality_flag: null

  - id: FR-014
    title: "Classifier validates domains and tags against the live corpus vocabulary"
    description: |
      Classifier given current established vocabulary. MAY emit established values OR
      propose new via separate facet_domain_proposed / facet_tags_proposed field — MUST NOT
      silently introduce never-seen term into established field.
    priority: must
    category: solution
    dependencies: [FR-012, FR-006]
    source_opportunity: OPP-007
    source_concerns: []
    quality_flag: null

  - id: FR-015
    title: "Classified document is embedded and indexed for hybrid retrieval"
    description: |
      Post-classification, document body embedded with configured local embedding model
      and inserted into retrieval index alongside keyword tokens, frontmatter facets,
      and graph edges. Index stored in single SQLite file.
    priority: must
    category: solution
    dependencies: [FR-013]
    source_opportunity: OPP-001
    source_concerns: []
    quality_flag: null

  - id: FR-016a
    title: "Pipeline stages are idempotent (re-running a stage produces no duplicate writes)"
    description: |
      Each pipeline stage (validate, extract, classify, embed, index) is idempotent —
      re-execution on the same input produces identical persistent state with no
      duplicate index rows, frontmatter entries, or embedding rows.
    priority: must
    category: solution
    dependencies: [FR-011, FR-013, FR-015]
    source_opportunity: OPP-008
    source_concerns: []
    quality_flag: null

  - id: FR-016b
    title: "Pipeline is resumable from per-stage checkpoints after process kill"
    description: |
      Each stage records per-document checkpoint on successful completion. Process killed
      at any stage leaves corpus in recoverable state; on restart, pipeline resumes from
      last successful stage per document — no duplicates, no partial writes. (Split from
      FR-016 per Splitting Test: idempotency and resumability are independently verifiable.)
    priority: must
    category: solution
    dependencies: [FR-016a]
    source_opportunity: OPP-008
    source_concerns: []
    quality_flag: null

  - id: FR-017
    title: "Pipeline uses content-hash idempotency keys to prevent duplicate ingest"
    description: |
      Each document identified by stable content hash at validation. Re-submission of
      identical content (file dropped twice, URL re-fetched unchanged) detected and
      short-circuits to no-op rather than producing duplicates.
    priority: must
    category: solution
    dependencies: [FR-010]
    source_opportunity: OPP-008
    source_concerns: []
    quality_flag: null

  - id: FR-018
    title: "Failed ingests route to a failure lane with structured diagnostics"
    description: |
      Failed pipeline stage moves doc to failure lane with structured diagnostic record
      (stage, error code, message, retriable flag, source pointer). Inspectable via
      filesystem AND MCP resource corpus://failures. Failed docs do NOT enter searchable
      index. AG-001 honored (no UI; structured-data + agent-mediated).
    priority: must
    category: solution
    dependencies: [FR-016b]
    source_opportunity: OPP-008
    source_concerns: []
    quality_flag: null

  # ═══════════════════════════════════════════════════════════════════
  # MUST-HAVE — STAKEHOLDER
