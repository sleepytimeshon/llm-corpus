  - id: NFR-007
    title: "Cross-agent retrieval-quality parity (top-3 Jaccard ≥ 0.7 on shared queries)"
    description: |
      For shared 20-query script, top-3 SearchHits returned by corpus.find when invoked
      from Claude Code vs Gemini CLI have Jaccard similarity ≥ 0.7. Cross-agent NFR
      refined from A-006 by Stage 1 handoff CF-1. AG-004 applies (cross-agent →
      should-priority).
    priority: should
    category: nonfunctional
    nfr_subcategory: reliability
    quantitative_targets:
      - metric: top3_jaccard_claude_vs_gemini
        value: 0.7
        unit: ratio
        test_method: 20-query shared script run via Claude Code MCP + Gemini CLI MCP against identical corpus snapshot; compare top-3 doc URIs per query
    dependencies: [FR-022]
    source_opportunity: OPP-004
    source_concerns: [C-001]
    quality_flag: conflicts-anti-goal

  - id: NFR-008
    title: "Local-LLM tool-use rate (≥N corpus.find calls per 100 llama queries — absolute)"
    description: |
      Ollama-served llama3/qwen3 with corpus MCP attached invokes corpus.find ≥N times per
      100 knowledge-grounded queries. ABSOLUTE target (CF-3 from Stage 1 handoff —
      explicitly NOT relative-to-cloud-baseline; PM-Review confirmed C-006 invalid).
      N to be set at Plan stage from Validate spike data. AG-004 → should-priority.
    priority: should
    category: nonfunctional
    nfr_subcategory: usability
    quantitative_targets:
      - metric: corpus_find_invocations_per_100_local_llm_queries
        value: null
        unit: count
        test_method: 100-query benchmark run through Ollama-served model with MCP corpus server attached; count corpus.find tool invocations; absolute floor set at Plan stage from Validate spike data — MUST NOT reference cloud baseline
    dependencies: [FR-023]
    source_opportunity: OPP-006
    source_concerns: [C-009]
    quality_flag: conflicts-anti-goal

  - id: NFR-009
    title: "Classifier wall-clock per document on target hardware (Research-baselined)"
    description: |
      Classifier (FR-012) completes per document within wall-clock budget on target
      hardware (M-series Mac 32GB) so ingest doesn't feel like background tax. Baseline:
      Qwen 2.5 7B Q4_K_M ~25-35 tok/s; ~150-token classification JSON ≈ 5s/doc → ~12
      docs/min single-stream, ≥30 docs/min with batch concurrency=2. Source: Stage 2 Research.
    priority: should
    category: nonfunctional
    nfr_subcategory: performance
    quantitative_targets:
      - metric: classifier_wall_clock_per_doc_p95_single_stream
        value: 5000
        unit: ms
        test_method: 100-doc benchmark of varying length on target hardware; Qwen 2.5 7B Q4_K_M via Ollama; measure wall-clock per doc
      - metric: classifier_throughput_with_concurrency_2
        value: 30
        unit: docs_per_minute
        test_method: same benchmark with Ollama OLLAMA_NUM_PARALLEL=2
    dependencies: [FR-012]
    source_opportunity: OPP-003
    source_concerns: []
    quality_flag: null

  - id: NFR-010
    title: "Index is a single SQLite file"
    description: |
      Retrieval index stored in single SQLite file (whitepaper architectural commitment).
      Backup, copy, move operations are file-level requiring no service coordination.
    priority: should
    category: nonfunctional
    nfr_subcategory: maintainability
    quantitative_targets:
      - metric: index_storage_files
        value: 1
        unit: count
        test_method: ls of index directory after full ingest+index of 100-doc benchmark
    dependencies: [FR-015]
    source_opportunity: OPP-005
    source_concerns: []
    quality_flag: null

  - id: NFR-011
    title: "Pipeline observability via structured event log"
    description: |
      Each pipeline stage transition emits structured log event (doc id, stage, outcome,
      duration, timestamp). Append-only, inspectable from CLI without external observability
      stack.
    priority: should
    category: nonfunctional
    nfr_subcategory: observability
    quantitative_targets:
      - metric: log_event_per_stage_transition
        value: 1
        unit: events_per_transition
        test_method: 50-doc ingest run; assert one event per stage per doc per outcome
    dependencies: [FR-016b]
    source_opportunity: OPP-008
    source_concerns: []
    quality_flag: null

  - id: NFR-016
    title: "Telemetry surface ≥ 6 named event classes (Research-baselined)"
    description: |
      Telemetry layer emits ≥6 event classes to rotating local NDJSON log: query.executed,
      ingest.completed, classification.failed, egress.blocked, index.rebuilt, mcp.tool_invoked.
      Exposed via MCP resource for inspection. Zero outbound HTTP from telemetry layer
      (subject to NFR-001 + NFR-002). Source: Stage 2 Research.
    priority: should
    category: nonfunctional
    nfr_subcategory: observability
    quantitative_targets:
      - metric: telemetry_event_classes_emitted
        value: 6
        unit: classes
        test_method: integration suite asserts each event class appears with required fields; verify zero outbound HTTP from telemetry layer
    dependencies: [NFR-001]
    source_opportunity: OPP-008
    source_concerns: []
    quality_flag: null

  # ═══════════════════════════════════════════════════════════════════
  # NICE-TO-HAVE
  # ═══════════════════════════════════════════════════════════════════

  - id: FR-024
    title: "Inbox supports email/inbox-watcher source in addition to file drop and URL"
    description: |
      Configurable inbox source pulls from local mail-folder or other inbox-style source.
      Pulled docs enter same validation gate and pipeline as file drops.
    priority: nice
    category: solution
    dependencies: [FR-010]
    source_opportunity: OPP-008
    source_concerns: []
    quality_flag: null

  - id: FR-025
    title: "Knowledge-graph edges between documents are visible via a corpus.related tool"
    description: |
      Second MCP tool corpus.related returns documents adjacent to a given doc via
      knowledge-graph edges already used by FR-003. Useful for follow-up navigation.
    priority: nice
    category: solution
    dependencies: [FR-003, FR-008]
    source_opportunity: OPP-001
    source_concerns: []
    quality_flag: null

  - id: FR-026
    title: "User can mark a corpus.find result as accepted or rejected to inform future ranking"
    description: |
      Lightweight feedback channel (CLI or agent-mediated) lets user mark returned SearchHit
      as useful or not. Logged to feedback ledger; future ranking MAY use as signal but
      not required to. Hooks into M-001 north-star but acceptance is not required to be
      machine-captured in v1.
    priority: nice
    category: stakeholder
    dependencies: [FR-002]
    source_opportunity: OPP-001
    source_concerns: []
    quality_flag: null

  - id: NFR-012
    title: "Classifier marginal cost per document is zero on user hardware"
    description: |
      Classifier (FR-012) runs entirely on user hardware with no paid-API call —
      marginal cost per ingested doc = 0. Implied by NFR-001/002 + FR-012 architecture;
      surfaced explicitly for traceability to A-005.
    priority: nice
    category: nonfunctional
    nfr_subcategory: maintainability
    quantitative_targets:
      - metric: paid_api_calls_per_ingest
        value: 0
        unit: calls
        test_method: code-path inspection + runtime audit during 100-doc benchmark
    dependencies: [NFR-001, NFR-002, FR-012]
    source_opportunity: OPP-003
    source_concerns: []
    quality_flag: null

  - id: NFR-013
    title: "Auto-proposed taxonomy growth feels like enrichment, not noise (qualitative)"
    description: |
      After 30 days of v1 use, user reflects on whether auto-proposed-and-promoted domains
      felt like meaningful enrichment vs noise. Qualitative interview test (A-011, desirability).
    priority: nice
    category: nonfunctional
    nfr_subcategory: usability
    quantitative_targets:
      - metric: user_reported_taxonomy_growth_satisfaction
        value: enrichment
        unit: qualitative_label
        test_method: 30-day-use reflection interview with Shon; label as enrichment | mixed | noise
    dependencies: [FR-019]
    source_opportunity: OPP-007
    source_concerns: []
    quality_flag: null

