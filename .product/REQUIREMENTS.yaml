# Requirements — llm-corpus

# Canonical machine-readable requirements artifact.
# PRD.md is the human-readable derived view; if PRD and this disagree, this wins.

requirements:
- id: UR-001
  title: User can drop a file into the inbox and have it become queryable without further action
  description: 'P-001 (Maya) drops PDF/Markdown/text into configured inbox. With no further action,

    doc validated, normalized, classified, embedded, indexed, and returnable from

    corpus.find on next matching query.'
  priority: must
  category: stakeholder
  dependencies:
    - FR-010
    - FR-011
    - FR-012
    - FR-015
  source_opportunity: OPP-008
  source_concerns: []
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - dropped document becomes queryable on next matching query without further action
        - dropped document that fails classification is NOT silently queryable
        - dropped document becomes queryable within the configured ingest budget
  owner: Shon

- id: UR-002
  title: User can ask their agent a knowledge-grounded question and receive a corpus-grounded answer
  description: 'P-001 (Maya) or P-002 (David) opens Claude Code session, asks question whose answer

    is in corpus. Agent invokes corpus.find, receives ranked SearchHits, grounds answer

    with traceable references back to source documents.'
  priority: must
  category: stakeholder
  dependencies:
    - FR-002
    - FR-008
    - FR-009
  source_opportunity: OPP-001
  source_concerns: []
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - agent invokes corpus.find and grounds answer with traceable references
        - agent does not fabricate corpus citations when corpus.find returns empty
        - cross-document grounding works when SearchHits span multiple documents
  owner: Shon

- id: UR-003
  title: User can install the corpus once and have it available across new agent sessions
  description: 'After single install, every new agent session sees corpus state via auto-loaded

    manifest/taxonomy/recent-ingests resources — no per-session reconfiguration,

    session-start does not re-feed corpus.'
  priority: must
  category: stakeholder
  dependencies:
    - FR-005
    - FR-006
    - FR-007
  source_opportunity: OPP-002
  source_concerns: []
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - install once, available across new agent sessions via auto-loaded resources
        - opening a new session does not duplicate corpus state
        - agent session started before corpus init returns a clear unavailable error
  owner: Shon

- id: FR-001
  title: MCP server exposes corpus.find tool over stdio transport
  description: 'The system runs as a single MCP server process that registers a corpus.find tool

    with the MCP runtime. The tool is discoverable via the standard MCP tool-listing

    handshake and invokable by any MCP-aware client connected over stdio.'
  priority: must
  category: solution
  dependencies: []
  source_opportunity: OPP-001
  source_concerns: []
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - corpus.find tool is discoverable via MCP tool-listing handshake
        - stdio transport is the only registered transport
        - server registers exactly one corpus.find tool with no aliases
        - tools/list during server cold-start returns retriable error
  owner: Shon

- id: FR-002
  title: corpus.find accepts a structured query and returns ranked SearchHit list
  description: 'The corpus.find tool takes a structured input (free-text query string + optional

    filter facets) and returns an ordered SearchHit list. Each hit has stable URI,

    relevance-ordered rank, confidence-weighted score, and content excerpt sufficient

    for grounding without an additional fetch.'
  priority: must
  category: solution
  dependencies:
    - FR-001
  source_opportunity: OPP-001
  source_concerns: []
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - corpus.find returns a ranked SearchHit list for a structured query
        - corpus.find with empty query returns structured error envelope
        - corpus.find on an empty corpus returns an empty SearchHit list
        - corpus.find with malformed filter facet returns structured error
  owner: Shon

- id: FR-003
  title: corpus.find ranks results via hybrid retrieval (BM25 + dense + graph + confidence)
  description: 'Ranking fuses keyword match (FTS5 BM25), dense vector similarity (sqlite-vec),

    knowledge-graph edges, and classifier-assigned confidence. Specific fusion algorithm

    (RRF, weighted sum, etc.) deferred to ADR; the four signals MUST all be inputs.'
  priority: must
  category: solution
  dependencies:
    - FR-002
  source_opportunity: OPP-001
  source_concerns: []
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - corpus.find ranking fuses BM25, dense, graph, and confidence signals
        - dense-vector signal failure does not silently disable ranking
        - ranking handles a query matching only one of the four signals
        - disabling any single ranking signal measurably changes top-K results
  owner: Shon

- id: FR-004
  title: corpus.find returns deterministic structured error envelope on failure
  description: 'Non-success outcomes return a structured error envelope (stable error-code enum,

    human-readable message, hint field) as a normal MCP tool response — not a transport

    exception — so calling agents reason about failures in-band.'
  priority: must
  category: solution
  dependencies:
    - FR-002
  source_opportunity: OPP-001
  source_concerns: []
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - corpus.find non-success returns structured error envelope as MCP tool response
        - error envelope error_code values come from a stable enumerated set
        - transport-level disconnect during corpus.find produces no orphaned state
  owner: Shon

- id: FR-005
  title: MCP server exposes corpus manifest as auto-loaded resource
  description: 'The server registers a manifest resource at corpus://manifest summarizing corpus

    state (doc count, established domains, established tags, last ingest timestamp).

    Annotated for auto-load at session start so agents bias toward the corpus without

    per-prompt nudging.'
  priority: must
  category: solution
  dependencies:
    - FR-001
  source_opportunity: OPP-002
  source_concerns: []
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - manifest resource is registered at corpus://manifest with auto-load annotation
        - manifest resource is not exposed at any non-canonical URI
        - manifest on freshly initialized empty corpus returns zero counts
  owner: Shon

- id: FR-006
  title: MCP server exposes taxonomy resource listing established domains and tags
  description: 'Resource at corpus://taxonomy enumerates established (promoted) domains and tags

    with per-term document counts. Canonical vocabulary for filtering corpus.find calls.'
  priority: must
  category: solution
  dependencies:
    - FR-005
  source_opportunity: OPP-002
  source_concerns: []
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - taxonomy resource enumerates established domains and tags with counts
        - taxonomy resource excludes proposed-only terms
        - taxonomy on empty corpus returns empty domain and tag lists
  owner: Shon

- id: FR-007
  title: MCP server exposes recent-ingests resource
  description: 'Resource at corpus://recent lists most recently successfully ingested documents

    (title, domain, tags, ingest timestamp). Default window N (negotiable at Plan).'
  priority: must
  category: solution
  dependencies:
    - FR-005
  source_opportunity: OPP-002
  source_concerns: []
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - recent-ingests resource lists most recent successful ingests
        - recent-ingests resource excludes failure-lane documents
        - recent-ingests on empty corpus returns empty list
  owner: Shon

- id: FR-008
  title: MCP server exposes per-document resource at stable URI
  description: 'Each ingested document addressable via stable URI corpus://docs/{id} returning

    normalized Markdown body + YAML frontmatter. URIs returned by corpus.find

    dereference here without ambiguity.'
  priority: must
  category: solution
  dependencies:
    - FR-002
  source_opportunity: OPP-004
  source_concerns: []
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - per-document resource at corpus://docs/{id} returns normalized body and frontmatter
        - per-document resource for unknown id returns structured not-found error
        - SearchHit URIs returned by corpus.find dereference exactly to per-document resource URIs
        - per-document resource read while index is locked returns retriable error
  owner: Shon

- id: FR-009
  title: MCP server registers reusable retrieval prompt templates
  description: 'Server registers ≥1 reusable MCP prompt template instructing calling agents on

    how/when to invoke corpus.find before answering knowledge-grounded questions.

    Required for A-001 (cloud-LLM tool-use rate) to be testable in Validate.'
  priority: must
  category: solution
  dependencies:
    - FR-001
  source_opportunity: OPP-001
  source_concerns: []
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - server registers at least one retrieval prompt template
        - prompts/list never returns an empty list when retrieval template is required
        - registered prompt template includes structured instruction for knowledge-grounded questions
  owner: Shon

- id: FR-010
  title: Filesystem inbox watcher enqueues new documents for ingest
  description: 'Watcher monitors configured inbox directory. New files pass validation gate

    (extension allowlist, MIME sniff, max size, filename sanity) before enqueue.

    Watcher runs in same local process tree as server.'
  priority: must
  category: solution
  dependencies: []
  source_opportunity: OPP-008
  source_concerns: []
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - file dropped into inbox is enqueued for ingest after passing validation
        - file with disallowed extension is rejected at validation gate
        - file at maximum allowed size passes validation
        - file exceeding max size is rejected with structured diagnostic
        - filename failing sanity check is rejected before content read
  owner: Shon

- id: FR-011
  title: Ingest pipeline normalizes documents to Markdown with YAML frontmatter
  description: 'Each accepted document extracted (PDF/HTML/text/etc.) and normalized to Markdown

    body + structured YAML frontmatter (id, source path, ingest timestamp, MIME type, hash).'
  priority: must
  category: solution
  dependencies:
    - FR-010
  source_opportunity: OPP-008
  source_concerns: []
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - PDF document is normalized to Markdown body with structured YAML frontmatter
        - HTML document with unsupported encoding is routed to failure lane
        - plain-text file with zero bytes normalizes to an empty Markdown body
  owner: Shon

- id: FR-012
  title: Local-LLM classifier emits schema-valid metadata via grammar-constrained generation
  description: 'Classifier invokes local LLM (Ollama-served) with format param set to a Zod-derived

    JSON Schema. Output structurally constrained at token-generation level — invalid

    metadata impossible by construction. Schema covers domain, tags, summary, confidence.'
  priority: must
  category: solution
  dependencies:
    - FR-011
  source_opportunity: OPP-003
  source_concerns: []
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - classifier emits schema-valid metadata via grammar-constrained generation
        - classifier without grammar constraint configuration refuses to start
        - classifier handles document with maximum-length content within token budget
        - Ollama service unavailable routes documents to failure lane with retriable flag
        - classifier produces schema-valid output on first generation attempt with retry_count=0
  owner: Shon

- id: FR-013
  title: Classifier output is schema-validated before frontmatter writeback
  description: 'Defense-in-depth validator runs on each classifier response before frontmatter write.

    Validation failure routes document to failure lane with structured diagnostic — does

    NOT silently drop or coerce.'
  priority: must
  category: solution
  dependencies:
    - FR-012
  source_opportunity: OPP-003
  source_concerns: []
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - schema-validated classifier output is written to frontmatter
        - schema-invalid classifier output routes document to failure lane (no silent coercion)
        - validator does not coerce missing required fields
  owner: Shon

- id: FR-014
  title: Classifier validates domains and tags against the live corpus vocabulary
  description: 'Classifier given current established vocabulary. MAY emit established values OR

    propose new via separate facet_domain_proposed / facet_tags_proposed field — MUST NOT

    silently introduce never-seen term into established field.'
  priority: must
  category: solution
  dependencies:
    - FR-012
    - FR-006
  source_opportunity: OPP-007
  source_concerns: []
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - classifier accepts established vocabulary and emits established values directly
        - classifier MUST NOT silently introduce a never-seen term into established field
        - classifier proposes new term via separate proposed facet without polluting established
        - vocabulary validation across input cases
  owner: Shon

- id: FR-015
  title: Classified document is embedded and indexed for hybrid retrieval
  description: 'Post-classification, document body embedded with configured local embedding model

    and inserted into retrieval index alongside keyword tokens, frontmatter facets,

    and graph edges. Index stored in single SQLite file.'
  priority: must
  category: solution
  dependencies:
    - FR-013
  source_opportunity: OPP-001
  source_concerns: []
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - classified document is embedded and inserted into single SQLite index
        - embedding model failure routes document to failure lane and skips index write
        - zero-content document still produces deterministic index rows
  owner: Shon

- id: FR-016a
  title: Pipeline stages are idempotent (re-running a stage produces no duplicate writes)
  description: 'Each pipeline stage (validate, extract, classify, embed, index) is idempotent —

    re-execution on the same input produces identical persistent state with no

    duplicate index rows, frontmatter entries, or embedding rows.'
  priority: must
  category: solution
  dependencies:
    - FR-011
    - FR-013
    - FR-015
  source_opportunity: OPP-008
  source_concerns: []
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - re-running a stage on the same input produces identical persistent state
        - re-running validate stage does not enqueue a duplicate ingest job
        - each pipeline stage is independently idempotent across all 5 stages
  owner: Shon

- id: FR-016b
  title: Pipeline is resumable from per-stage checkpoints after process kill
  description: 'Each stage records per-document checkpoint on successful completion. Process killed

    at any stage leaves corpus in recoverable state; on restart, pipeline resumes from

    last successful stage per document — no duplicates, no partial writes. (Split from

    FR-016 per Splitting Test: idempotency and resumability are independently verifiable.)'
  priority: must
  category: solution
  dependencies:
    - FR-016a
  source_opportunity: OPP-008
  source_concerns: []
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - process killed mid-classify resumes from per-stage checkpoint on restart
        - kill before extract checkpoint leaves no partial frontmatter writes
        - per-stage checkpoint is recorded only after stage success
        - corrupted checkpoint file forces full pipeline re-run for affected document
  owner: Shon

- id: FR-017
  title: Pipeline uses content-hash idempotency keys to prevent duplicate ingest
  description: 'Each document identified by stable content hash at validation. Re-submission of

    identical content (file dropped twice, URL re-fetched unchanged) detected and

    short-circuits to no-op rather than producing duplicates.'
  priority: must
  category: solution
  dependencies:
    - FR-010
  source_opportunity: OPP-008
  source_concerns: []
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - identical file dropped twice short-circuits via content-hash idempotency
        - same logical file with modified content produces a new document
        - identical content under different filenames is detected as duplicate
  owner: Shon

- id: FR-018
  title: Failed ingests route to a failure lane with structured diagnostics
  description: 'Failed pipeline stage moves doc to failure lane with structured diagnostic record

    (stage, error code, message, retriable flag, source pointer). Inspectable via

    filesystem AND MCP resource corpus://failures. Failed docs do NOT enter searchable

    index. AG-001 honored (no UI; structured-data + agent-mediated).'
  priority: must
  category: solution
  dependencies:
    - FR-016b
  source_opportunity: OPP-008
  source_concerns: []
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - failed pipeline stage routes document to failure lane with structured diagnostic
        - failed documents do NOT enter the searchable index
        - failure lane is inspectable via both filesystem and corpus://failures resource
        - failure-lane writes are durable across crashes
  owner: Shon

- id: TR-001
  title: Single install command provisions server, index, and inbox directory
  description: 'Single command (`corpus init`) creates XDG-compliant directory layout (config, data,

    state), empty SQLite index, inbox directory; registers MCP server with user''s MCP-client

    config; prints next-step instructions. No multi-step manual configuration.'
  priority: must
  category: transition
  dependencies:
    - FR-001
    - FR-010
    - FR-015
  source_opportunity: OPP-004
  source_concerns: []
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - single `corpus init` command provisions server, index, and inbox in XDG layout
        - re-running `corpus init` on existing install does not destroy user data
        - install requires zero multi-step manual configuration
        - install on machine without write permission to XDG dirs fails with clear error
  owner: Shon

- id: TR-002
  title: Install is reversible — uninstall removes server registration without deleting corpus data
  description: 'Uninstall removes only what install created in agent-tooling configuration; user

    data (ingested docs, index file, frontmatter) preserved by default, removed only

    via explicit destructive flag.'
  priority: must
  category: transition
  dependencies:
    - TR-001
  source_opportunity: OPP-004
  source_concerns: []
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - '`corpus uninstall` removes server registration but preserves user data by default'
        - '`corpus uninstall` does NOT remove user data without explicit destructive flag'
        - '`corpus uninstall --purge` removes user data only with explicit destructive flag'
  owner: Shon

- id: NFR-001
  title: Local-only enforcement via static lint of forbidden network imports
  description: 'Repository lint scans pipeline + adapter source packages and fails build on any

    forbidden network import (no fetch, no http/https client, no cloud-provider SDK).

    Runs in CI on every PR. Compile-time half of local-only enforcement.'
  priority: must
  category: nonfunctional
  dependencies: []
  source_opportunity: OPP-005
  source_concerns: []
  nfr_subcategory: security
  quantitative_targets:
    - metric: forbidden_imports_in_pipeline_or_adapter_packages
      value: 0
      unit: count
      test_method: CI lint job over full source tree on every PR
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - CI lint passes when no forbidden network imports exist in pipeline or adapter packages
        - CI lint fails the build when a forbidden network import is added to pipeline package
        - forbidden import detection across import patterns
        - lint runs on every PR (not just main)
  owner: Shon

- id: NFR-002
  title: Runtime egress audit confirms zero outbound non-loopback packets on privileged-data path
  description: 'End-to-end ingest-classify-index-find cycle on sentinel privileged document — runtime

    packet capture observes zero outbound non-loopback packets. Runtime half of local-only

    enforcement (CF-2 from Stage 1 handoff, refining A-007). Recommended approach per

    Stage 2 Research: in-process Node hook (undici dispatcher + net.Socket patch) +

    OS-level pf/iptables defense-in-depth on MCP server UID. Not subject to AG-004

    (local-only enforcement, not cross-agent).'
  priority: must
  category: nonfunctional
  dependencies:
    - NFR-001
  source_opportunity: OPP-005
  source_concerns: []
  nfr_subcategory: security
  quantitative_targets:
    - metric: outbound_non_loopback_packets_during_full_cycle
      value: 0
      unit: packets
      test_method: tcpdump on non-loopback interfaces during full ingest+classify+index+find of sentinel privileged doc; integration test fires HTTP/DNS/raw-TCP to disallowed hosts and asserts blocking + audit log entry
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - Runtime egress audit for privileged-data path
        - integration test fires HTTP to disallowed host and asserts blocking + audit
        - in-process Node hook blocks undici dispatcher AND raw net.Socket connect
        - OS-level pf/iptables defense-in-depth blocks egress under MCP server UID
        - in-process Node hook blocks all outbound network primitives
        - in-process egress hook is active during ALL operations on ALL documents (not sentinel-only)
  owner: Shon

- id: NFR-003
  title: corpus.find p95 latency ≤ 250ms at 5k docs (Research-baselined)
  description: 'For corpus up to 5,000 docs on Shon''s reference hardware, corpus.find returns ranked

    SearchHits within p95 ≤ 250ms (p50 ≤ 100ms). Baseline: sqlite-vec exhaustive KNN

    ~8-25ms on 5k 384-dim vectors; Smart Connections UX bar of "responsive without

    third-party vector DB". Source: Stage 2 Research 2026-04-27, sqlite-vec README.'
  priority: must
  category: nonfunctional
  dependencies:
    - FR-002
    - FR-003
  source_opportunity: OPP-001
  source_concerns: []
  nfr_subcategory: performance
  quantitative_targets:
    - metric: corpus_find_latency_p95
      value: 250
      unit: ms
      test_method: 100-query synthetic workload via better-sqlite3 benchmark harness, warm SQLite page cache, 5000-doc corpus on reference hardware
    - metric: corpus_find_latency_p50
      value: 100
      unit: ms
      test_method: same harness as p95
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - corpus.find p95 latency at 5k docs is at most 250 ms
        - corpus.find p50 latency at 5k docs is at most 100 ms
        - corpus.find latency budget is measured at 5k-doc corpus, not smaller
        - cold-cache run is reported separately and does not satisfy the warm-cache budget
        - corpus.find p95 latency holds on unseen query distribution with no result memoization
  owner: Shon

- id: NFR-004
  title: Classifier produces schema-valid output on 100% of inputs in benchmark
  description: 'Across 100-document benchmark spanning supported MIME types, classifier (FR-012)

    produces schema-valid output on 100% of documents. Validates A-004 (grammar-constrained

    generation reliability).'
  priority: must
  category: nonfunctional
  dependencies:
    - FR-012
    - FR-013
  source_opportunity: OPP-003
  source_concerns: []
  nfr_subcategory: reliability
  quantitative_targets:
    - metric: schema_valid_classifier_output_rate
      value: 100
      unit: percent
      test_method: 100-document benchmark; Zod schema validation on every classifier response
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - classifier produces schema-valid output on 100% of 100-document benchmark
        - a single schema-invalid classifier response in benchmark fails the NFR
  owner: Shon

- id: NFR-005
  title: Pipeline survives kill -9 at any stage without index corruption or duplicate ingest
  description: 'Test harness sends SIGKILL at each of 5 stages on 50-doc run. After restart, pipeline

    resumes and completes all 50 docs exactly once with no duplicate index entries,

    no partial frontmatter, no orphaned embeddings. SQLite integrity check passes.'
  priority: must
  category: nonfunctional
  dependencies:
    - FR-016a
    - FR-016b
  source_opportunity: OPP-008
  source_concerns: []
  nfr_subcategory: reliability
  quantitative_targets:
    - metric: docs_ingested_exactly_once_after_kill_at_each_stage
      value: 50
      unit: docs
      test_method: SIGKILL harness, 5 trials (one per stage) over 50-doc set
    - metric: index_corruption_after_kill
      value: 0
      unit: incidents
      test_method: SQLite PRAGMA integrity_check post-resume
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - pipeline survives SIGKILL at each of 5 stages on 50-doc run with no duplicate ingest
        - SIGKILL during classify stage produces no orphaned embedding rows
        - SIGKILL across multiple trials accumulates zero index corruption incidents
        - SIGKILL during index commit leaves SQLite in valid WAL-recoverable state
  owner: Shon

- id: NFR-006
  title: Failure lane diagnostics are sufficient for triage without a UI
  description: 'Each failure-lane entry contains enough structured info (stage, error code, message,

    source pointer, retriable flag) that user triages and acts (replay, correct, delete)

    using only CLI tooling and MCP failure resource. No human-facing UI required (AG-001).'
  priority: must
  category: nonfunctional
  dependencies:
    - FR-018
  source_opportunity: OPP-008
  source_concerns: []
  nfr_subcategory: usability
  quantitative_targets:
    - metric: failure_lane_entries_actionable_without_UI_in_30_day_use
      value: 100
      unit: percent
      test_method: 30-day Shon-with-Claude-Code use; classify each failure-lane interaction as resolved-via-CLI-or-agent vs blocked-on-missing-UI
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - every failure-lane entry contains stage, error_code, message, source pointer, retriable flag
        - 100% of failure-lane interactions in 30-day use are resolved via CLI or agent (no missing-UI blocker)
        - failure-lane entries that lack a source pointer are detected by validation
        - NFR-006 metric requires minimum N=10 failure-lane events before computing rate
  owner: Shon

- id: NFR-014
  title: First-run setup ≤ 90 seconds from npx invocation to first successful corpus.find (Research-baselined)
  description: 'Clean-machine timing of `npx <pkg> init` → first successful corpus.find query

    completes in ≤ 90 seconds. Floor = no Docker, no compile step. Comparison: Mem0

    self-hosted ~2-5 min (with Docker pulls); Letta Code sub-minute with Node 18+

    present. Source: Stage 2 Research 2026-04-27.'
  priority: must
  category: nonfunctional
  dependencies:
    - TR-001
    - FR-002
    - FR-010
    - FR-015
  source_opportunity: OPP-004
  source_concerns: []
  nfr_subcategory: usability
  quantitative_targets:
    - metric: time_from_npx_to_first_corpus_find_result
      value: 90
      unit: seconds
      test_method: Clean Linux + macOS machines, time `npx <pkg> init` through ingest of single seed doc through first matching corpus.find query
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - first-run setup completes in at most 90 seconds end-to-end
        - first-run setup does not require Docker or a compile step
        - first-run setup on machine without Node 18+ exits with clear remediation
  owner: Shon

- id: NFR-015
  title: SQLite WAL recovery on reopen ≤ 2 seconds for WAL files <100MB (Research-baselined)
  description: 'After ungraceful shutdown (process crash mid-write), SQLite WAL replay on next

    reopen completes in ≤ 2 seconds for WAL files <100MB. Source: SQLite WAL docs,

    Stage 2 Research 2026-04-27.'
  priority: must
  category: nonfunctional
  dependencies:
    - FR-015
  source_opportunity: OPP-008
  source_concerns: []
  nfr_subcategory: reliability
  quantitative_targets:
    - metric: wal_recovery_time_on_reopen_after_crash
      value: 2000
      unit: ms
      test_method: Inject corruption (truncate WAL mid-write), measure reopen + PRAGMA integrity_check wall-clock; WAL file size <100MB
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - SQLite WAL recovery on reopen completes in at most 2 seconds for WAL <100 MB
        - WAL recovery time remains within budget at the 100 MB upper bound
  owner: Shon

- id: UR-004
  title: User can re-classify an existing document on demand
  description: 'P-002 (David) edits source of ingested doc or wants to re-run classification under

    updated taxonomy. CLI command re-runs classify+embed+index for named doc; old index

    rows replaced atomically.'
  priority: should
  category: stakeholder
  dependencies:
    - FR-012
    - FR-015
    - FR-017
  source_opportunity: OPP-007
  source_concerns: []
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - user re-classifies an existing document on demand
  owner: Shon

- id: UR-005
  title: User can replay a failed ingest after correction
  description: 'P-001 (Maya) inspects failure lane (FR-018), corrects underlying issue (e.g., re-saves

    corrupt PDF), issues CLI replay command. Document re-enters pipeline at appropriate stage.'
  priority: should
  category: stakeholder
  dependencies:
    - FR-018
    - FR-016b
  source_opportunity: OPP-008
  source_concerns: []
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - user replays a failed ingest after correcting source
  owner: Shon

- id: FR-019
  title: Dynamic-taxonomy promotion mechanism elevates proposed terms to established
  description: 'Proposed domain/tag (from FR-014) suggested across N independent ingests (N negotiable,

    adoption-threshold) auto-promotes to established. Promotion logged. Established terms

    then appear in taxonomy resource (FR-006) and become valid for established facets.'
  priority: should
  category: solution
  dependencies:
    - FR-014
    - FR-006
  source_opportunity: OPP-007
  source_concerns: []
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - proposed term auto-promotes to established after N independent ingests
        - promotion does not fire below threshold
  owner: Shon

- id: FR-020
  title: Inbox accepts URLs as a document source in addition to local files
  description: 'In addition to file drop, inbox accepts URL submission via CLI (`corpus add <url>`).

    URL fetched once at submission time; response body treated as document content;

    original URL recorded in frontmatter. URL-fetch adapter is the only outbound network

    call permitted in entire system; lives in clearly separated adapter so NFR-001 lint

    can scope-exempt explicitly.'
  priority: should
  category: solution
  dependencies:
    - FR-010
    - FR-017
  source_opportunity: OPP-008
  source_concerns: []
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - corpus add accepts a URL and ingests the response body as a document
  owner: Shon

- id: FR-021
  title: Server exposes a corpus.health diagnostic resource
  description: 'Diagnostic resource at corpus://health exposes pipeline throughput counters,

    failure-lane size, index doc count, last-ingest timestamps for operator triage

    from inside agent session.'
  priority: should
  category: solution
  dependencies:
    - FR-001
    - FR-018
  source_opportunity: OPP-008
  source_concerns: []
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - corpus.health exposes pipeline counters and failure-lane size
  owner: Shon

- id: FR-022
  title: MCP server is invocable from MCP-aware agents other than Claude Code
  description: 'Server registers with standard MCP discovery + transport such that other MCP-aware

    clients (Gemini CLI, Codex CLI) can connect and invoke corpus.find. Portability

    property of protocol, not v1 user-validated capability.'
  priority: should
  category: solution
  dependencies:
    - FR-001
  source_opportunity: OPP-004
  source_concerns:
    - C-001
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - corpus MCP server is invocable from a non-Claude-Code MCP client
  owner: Shon
  quality_flag: conflicts-anti-goal

- id: FR-023
  title: MCP server is invocable from Ollama-served local LLMs (qwen3, llama3)
  description: 'Server''s stdio transport works with Ollama-served local models supporting MCP tool use.

    corpus.find responses consumable by these models. Portability per AG-004, not

    user-validated capability.'
  priority: should
  category: solution
  dependencies:
    - FR-001
    - FR-022
  source_opportunity: OPP-006
  source_concerns:
    - C-009
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - corpus MCP server is invocable from an Ollama-served local LLM
  owner: Shon
  quality_flag: conflicts-anti-goal

- id: NFR-007
  title: Cross-agent retrieval-quality parity (top-3 Jaccard ≥ 0.7 on shared queries)
  description: 'For shared 20-query script, top-3 SearchHits returned by corpus.find when invoked

    from Claude Code vs Gemini CLI have Jaccard similarity ≥ 0.7. Cross-agent NFR

    refined from A-006 by Stage 1 handoff CF-1. AG-004 applies (cross-agent →

    should-priority).'
  priority: should
  category: nonfunctional
  dependencies:
    - FR-022
  source_opportunity: OPP-004
  source_concerns:
    - C-001
  nfr_subcategory: reliability
  quantitative_targets:
    - metric: top3_jaccard_claude_vs_gemini
      value: 0.7
      unit: ratio
      test_method: 20-query shared script run via Claude Code MCP + Gemini CLI MCP against identical corpus snapshot; compare top-3 doc URIs per query
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - Cross-agent retrieval quality parity
  owner: Shon
  quality_flag: conflicts-anti-goal

- id: NFR-008
  title: Local-LLM tool-use rate (deferred to v1.5+ under AI-as-principal framing — ADR-011)
  description: 'Ollama-served local LLM with corpus MCP attached invokes corpus.find at-need when
    the agent encounters knowledge gaps its training cutoff cannot fill. Per ADR-011 (supersedes
    ADR-010, supersedes ADR-005): the original 100-query benchmark framing measured a
    human-issues-natural-language-query → agent-decides-to-invoke flow that the product does NOT
    center on. The product makes the agent the principal user of the corpus via FR-005 auto-loaded
    resources at session start + UR-003 session-portability + WHITEPAPER §line 159 MCP-prompts
    protocol distribution + ARCHITECTURE §5.3-5.4 agent-as-principal. v1.0.0 ships with no
    validated tool-use rate floor (provisional N=20 from D-012 withdrawn per D-022; ADR-010 binary
    exit option B discharged). v1.5+ re-pilot under at-need behavioral framing (auto-load coverage
    smoke + real-prompt replay + skill-mediated workflow) is committed engineering work captured
    for a future ADR ceremony.'
  priority: nice_to_have
  category: nonfunctional
  dependencies:
    - FR-023
  source_opportunity: OPP-006
  source_concerns:
    - C-009
  nfr_subcategory: usability
  quantitative_targets:
    - metric: corpus_find_invocations_per_100_local_llm_queries
      value: null
      unit: count
      test_method: 'SUPERSEDED. The 100-query benchmark framing was measuring the wrong product
        flow (human-issues-query → agent-decides-to-invoke) and is not appropriate evidence for
        the AI-as-principal product. v1.5+ measurement re-spec (at-need behavioral test,
        auto-load coverage, real-prompt replay) is a future ADR ceremony; do NOT cite this
        metric or any floor value (including the withdrawn N=20 from D-012) in v1.0.0
        documentation, README, or roadmap. The merged SP-000-Lite harness scaffolding (PR #9,
        commit 8b3230d) is reusable for the v1.5 re-pilot; the spec package (PR #6, closed) is
        preserved for v1.5 fork-from continuity if helpful.'
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - "NFR-008 deferred to v1.5+ per ADR-011 / D-022 — no v1.0.0 acceptance criterion binds"
  owner: Shon
  quality_flag: conflicts-anti-goal

- id: NFR-009
  title: Classifier wall-clock per document on target hardware (Research-baselined)
  description: 'Classifier (FR-012) completes per document within wall-clock budget on target

    hardware (M-series Mac 32GB) so ingest doesn''t feel like background tax. Baseline:

    Qwen 2.5 7B Q4_K_M ~25-35 tok/s; ~150-token classification JSON ≈ 5s/doc → ~12

    docs/min single-stream, ≥30 docs/min with batch concurrency=2. Source: Stage 2 Research.'
  priority: should
  category: nonfunctional
  dependencies:
    - FR-012
  source_opportunity: OPP-003
  source_concerns: []
  nfr_subcategory: performance
  quantitative_targets:
    - metric: classifier_wall_clock_per_doc_p95_single_stream
      value: 5000
      unit: ms
      test_method: 100-doc benchmark of varying length on target hardware; Qwen 2.5 7B Q4_K_M via Ollama; measure wall-clock per doc
    - metric: classifier_throughput_with_concurrency_2
      value: 30
      unit: docs_per_minute
      test_method: same benchmark with Ollama OLLAMA_NUM_PARALLEL=2
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - classifier wall-clock per document meets single-stream and concurrent budgets
  owner: Shon

- id: NFR-010
  title: Index is a single SQLite file
  description: 'Retrieval index stored in single SQLite file (whitepaper architectural commitment).

    Backup, copy, move operations are file-level requiring no service coordination.'
  priority: should
  category: nonfunctional
  dependencies:
    - FR-015
  source_opportunity: OPP-005
  source_concerns: []
  nfr_subcategory: maintainability
  quantitative_targets:
    - metric: index_storage_files
      value: 1
      unit: count
      test_method: ls of index directory after full ingest+index of 100-doc benchmark
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - index storage is exactly one SQLite file
  owner: Shon

- id: NFR-011
  title: Pipeline observability via structured event log
  description: 'Each pipeline stage transition emits structured log event (doc id, stage, outcome,

    duration, timestamp). Append-only, inspectable from CLI without external observability

    stack.'
  priority: should
  category: nonfunctional
  dependencies:
    - FR-016b
  source_opportunity: OPP-008
  source_concerns: []
  nfr_subcategory: observability
  quantitative_targets:
    - metric: log_event_per_stage_transition
      value: 1
      unit: events_per_transition
      test_method: 50-doc ingest run; assert one event per stage per doc per outcome
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - every pipeline stage transition emits exactly one structured log event
  owner: Shon

- id: NFR-016
  title: Telemetry surface ≥ 6 named event classes (Research-baselined)
  description: 'Telemetry layer emits ≥6 event classes to rotating local NDJSON log: query.executed,

    ingest.completed, classification.failed, egress.blocked, index.rebuilt, mcp.tool_invoked.

    Exposed via MCP resource for inspection. Zero outbound HTTP from telemetry layer

    (subject to NFR-001 + NFR-002). Source: Stage 2 Research.'
  priority: should
  category: nonfunctional
  dependencies:
    - NFR-001
  source_opportunity: OPP-008
  source_concerns: []
  nfr_subcategory: observability
  quantitative_targets:
    - metric: telemetry_event_classes_emitted
      value: 6
      unit: classes
      test_method: integration suite asserts each event class appears with required fields; verify zero outbound HTTP from telemetry layer
  acceptance_criteria:
    - feature: ./ACCEPTANCE-CRITERIA.feature
      scenarios:
        - telemetry layer emits at least 6 named event classes
  owner: Shon

- id: FR-026
  title: User can mark a corpus.find result as accepted or rejected to inform future ranking
  description: 'Lightweight feedback channel (CLI or agent-mediated) lets user mark returned SearchHit

    as useful or not. Logged to feedback ledger; future ranking MAY use as signal but

    not required to. Hooks into M-001 north-star but acceptance is not required to be

    machine-captured in v1.'
  priority: nice
  category: stakeholder
  dependencies:
    - FR-002
  source_opportunity: OPP-001
  source_concerns: []
  acceptance_criteria: []
  owner: null

- id: FR-024
  title: Inbox supports email/inbox-watcher source in addition to file drop and URL
  description: 'Configurable inbox source pulls from local mail-folder or other inbox-style source.

    Pulled docs enter same validation gate and pipeline as file drops.'
  priority: nice
  category: solution
  dependencies:
    - FR-010
  source_opportunity: OPP-008
  source_concerns: []
  acceptance_criteria: []
  owner: null

- id: FR-025
  title: Knowledge-graph edges between documents are visible via a corpus.related tool
  description: 'Second MCP tool corpus.related returns documents adjacent to a given doc via

    knowledge-graph edges already used by FR-003. Useful for follow-up navigation.'
  priority: nice
  category: solution
  dependencies:
    - FR-003
    - FR-008
  source_opportunity: OPP-001
  source_concerns: []
  acceptance_criteria: []
  owner: null

- id: NFR-012
  title: Classifier marginal cost per document is zero on user hardware
  description: 'Classifier (FR-012) runs entirely on user hardware with no paid-API call —

    marginal cost per ingested doc = 0. Implied by NFR-001/002 + FR-012 architecture;

    surfaced explicitly for traceability to A-005.'
  priority: nice
  category: nonfunctional
  dependencies:
    - NFR-001
    - NFR-002
    - FR-012
  source_opportunity: OPP-003
  source_concerns: []
  nfr_subcategory: maintainability
  quantitative_targets:
    - metric: paid_api_calls_per_ingest
      value: 0
      unit: calls
      test_method: code-path inspection + runtime audit during 100-doc benchmark
  acceptance_criteria: []
  owner: null

- id: NFR-013
  title: Auto-proposed taxonomy growth feels like enrichment, not noise (qualitative)
  description: 'After 30 days of v1 use, user reflects on whether auto-proposed-and-promoted domains

    felt like meaningful enrichment vs noise. Qualitative interview test (A-011, desirability).'
  priority: nice
  category: nonfunctional
  dependencies:
    - FR-019
  source_opportunity: OPP-007
  source_concerns: []
  nfr_subcategory: usability
  quantitative_targets:
    - metric: user_reported_taxonomy_growth_satisfaction
      value: enrichment
      unit: qualitative_label
      test_method: 30-day-use reflection interview with Shon; label as enrichment | mixed | noise
  acceptance_criteria: []
  owner: null


out_of_scope:
- id: OOS-001
  item: Human-facing UI for browsing the corpus
  rationale: AG-001 (no human-facing UI for browsing, editing, or chatting with documents)
  revisit_at: post-v1 + 90 days
  source: ANTI-GOALS.md

- id: OOS-002
  item: Human-facing UI for editing document frontmatter
  rationale: AG-001 (frontmatter editing happens via user's text editor on underlying Markdown file)
  revisit_at: post-v1 + 90 days
  source: ANTI-GOALS.md

- id: OOS-003
  item: Chat interface to converse with documents directly
  rationale: AG-001 (the agent IS the UI; chat surface duplicates NotebookLM/AnythingLLM)
  revisit_at: post-v1 + 90 days
  source: ANTI-GOALS.md

- id: OOS-004
  item: Failure-lane triage UI
  rationale: AG-001 (failure lane is structured-data + agent-mediated per FR-018+NFR-006)
  revisit_at: post-v1 + 90 days
  source: ANTI-GOALS.md

- id: OOS-005
  item: LLM-generated summaries written into the canonical document store
  rationale: AG-002 (no LLM-generated/rewritten content; user is authority on document content)
  revisit_at: v2
  source: ANTI-GOALS.md

- id: OOS-006
  item: LLM-rewritten / cleaned-up versions of ingested documents replacing originals
  rationale: AG-002 (LLM is classifier and retrieval target, not compiler — Karpathy LLM Wiki contrast)
  revisit_at: v2
  source: ANTI-GOALS.md

- id: OOS-007
  item: Synthesized literature reviews stored in canonical corpus
  rationale: 'AG-002 (if generative-content workflow emerges, separate synthesis/ namespace with origin: ai-generated frontmatter)'
  revisit_at: v2
  source: ANTI-GOALS.md

- id: OOS-008
  item: Conversation memory / agent-side personality state
  rationale: AG-003 (memory = personality problem; corpus = experience problem; different objects, different lifecycles)
  revisit_at: never
  source: ANTI-GOALS.md

- id: OOS-009
  item: SaaS connectors (Gmail, Slack, Notion, Drive)
  rationale: AG-003 (SaaS connectors belong to Danswer/Onyx-class enterprise search)
  revisit_at: never
  source: ANTI-GOALS.md

- id: OOS-010
  item: Multi-user / team-shared corpus
  rationale: AG-003 (single-machine, single-user model; multi-user belongs to enterprise search)
  revisit_at: never
  source: ANTI-GOALS.md

- id: OOS-011
  item: Cross-agent USER-validated capability claim in v1 (Gemini CLI/Codex CLI/Ollama)
  rationale: AG-004 (cross-agent is portability property of MCP protocol, not user-validated capability of v1; FR-022, FR-023, NFR-007, NFR-008 ship as should-priority portability surfaces only)
  revisit_at: post-v1
  source: ANTI-GOALS.md

- id: OOS-012
  item: 50-query labeled retrieval evaluation harness
  rationale: AG-005 (formal retrieval eval deferred to v1.5+; v1 ships with M-001 queries-per-week + acceptance as north-star surrogate)
  revisit_at: v1.5
  source: ANTI-GOALS.md


